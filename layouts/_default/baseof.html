<!DOCTYPE html>
<html lang="{{ .Site.Language.Locale }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ block "title" . }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
    <meta name="description" content="VC Phönix - Der dynamische Volleyballverein.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="{{ "favicon.ico" | relURL }}">
    <link rel="stylesheet" href="{{ "css/style.css" | relURL }}">
</head>
<body class="{{ if .IsHome }}is-home{{ end }}">
    <div class="site-wrapper">
        {{ if not .IsHome }}
        <header class="header">
            <div class="logo">
                <a href="{{ .Site.BaseURL }}">
                    <img src="{{ "vc-phoenix.svg" | relURL }}" alt="VC Phönix Logo" class="header-logo">
                    VC PHÖNIX
                </a>
            </div>
            <nav class="nav">
                <ul>
                    {{ range .Site.Menus.main }}
                    <li><a href="{{ .URL | relURL }}">{{ .Name }}</a></li>
                    {{ end }}
                </ul>
            </nav>
        </header>
        {{ end }}

        <main class="main-content">
            {{ block "main" . }}{{ end }}
        </main>

        {{ if not .IsHome }}
        <footer class="footer">
            <p>&copy; {{ now.Year }} VC Phönix. Alle Rechte vorbehalten.</p>
        </footer>
        {{ end }}
    </div>
</body>
</html>
